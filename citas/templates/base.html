{% load static %}<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema de Citas Odontológicas{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f3f6fb;
            color: #1f2937;
            min-height: 100vh;
        }
        .navbar {
            background: linear-gradient(90deg, #0e7490, #155e75);
            color: white;
            padding: 16px 32px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 { font-size: 20px; font-weight: 600; }
        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.9;
        }
        .navbar a:hover { opacity: 1; }
        .container {
            max-width: 880px;
            margin: 32px auto;
            padding: 0 16px;
        }
